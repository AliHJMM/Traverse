server:
  port: 8082

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:traverse}
    username: ${POSTGRES_USER:traverse_admin}
    password: ${POSTGRES_PASSWORD:dev_local_only_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: users
  flyway:
    schemas: users
    default-schema: users
    locations: classpath:db/migration
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-must-be-at-least-32-bytes}

app:
  cookie:
    name: ${COOKIE_NAME:access_token}

management:
  endpoints:
    web:
      exposure:
        include: health
