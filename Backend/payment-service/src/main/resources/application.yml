server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:traverse}
    username: ${POSTGRES_USER:traverse_admin}
    password: ${POSTGRES_PASSWORD:dev_local_only_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment
  flyway:
    schemas: payment
    default-schema: payment
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-must-be-at-least-32-bytes}

app:
  cookie:
    name: ${COOKIE_NAME:access_token}

payment:
  stripe:
    # Get a free test-mode key at dashboard.stripe.com (no card required).
    # The placeholder below is not a real key and every live Stripe call
    # will fail until a real sk_test_... value is supplied.
    secret-key: ${STRIPE_SECRET_KEY:sk_test_not_configured}
  paypal:
    base-uri: ${PAYPAL_BASE_URI:https://api-m.sandbox.paypal.com}
    client-id: ${PAYPAL_CLIENT_ID:not_configured}
    client-secret: ${PAYPAL_CLIENT_SECRET:not_configured}

management:
  endpoints:
    web:
      exposure:
        include: health
