spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  neo4j:
    uri: bolt://localhost:7687

eureka:
  client:
    enabled: false

jwt:
  secret: test-secret-key-please-be-at-least-32-bytes-long

app:
  cookie:
    name: access_token
