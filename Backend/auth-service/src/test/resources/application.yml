spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: test-secret-key-please-be-at-least-32-bytes-long
  expiration-minutes: 60

app:
  cookie:
    name: access_token
    secure: false
