server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:traverse}
    username: ${POSTGRES_USER:traverse_admin}
    password: ${POSTGRES_PASSWORD:dev_local_only_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth
  flyway:
    schemas: auth
    default-schema: auth
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-must-be-at-least-32-bytes}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

app:
  cookie:
    name: ${COOKIE_NAME:access_token}
    secure: ${COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health
