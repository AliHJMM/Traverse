server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/users/**
        - id: travel-service
          uri: ${TRAVEL_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/travels/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/payments/**

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-must-be-at-least-32-bytes}

app:
  cookie:
    name: ${COOKIE_NAME:access_token}

management:
  endpoints:
    web:
      exposure:
        include: health
