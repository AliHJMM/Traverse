server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      # Discovery-based routing: each route's uri is lb://<eureka-app-name>,
      # resolved dynamically (and load-balanced across replicas) via Eureka
      # instead of a fixed host:port.
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: travel-service
          uri: lb://travel-service
          predicates:
            - Path=/api/travels/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-must-be-at-least-32-bytes}

app:
  cookie:
    name: ${COOKIE_NAME:access_token}

management:
  endpoints:
    web:
      exposure:
        include: health

# correlationId is populated by CorrelationIdFilter (see logging package) so
# a single request can be traced across every service's logs in Grafana/Loki.
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId:-nocorrelation}] %-5level ${spring.application.name} %logger{36} - %msg%n"
