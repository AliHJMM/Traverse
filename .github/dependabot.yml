# Patching cadence (Plan.md Phase 11): weekly automated PRs for outdated
# dependencies across every ecosystem in this repo, so "regular patching
# and updates for dependencies and containers" is an enforced mechanism,
# not a written policy nobody follows. Each PR still goes through the same
# Jenkins pipeline (build/test/SonarQube/quality gate) as any other PR
# before it can merge.
#
# Every entry caps itself two ways so this never floods the single Jenkins
# executor again (it once opened 47 simultaneous PRs, one per dependency,
# and every one queued a build):
#   - open-pull-requests-limit: 5   -- at most 5 open PRs per entry
#   - groups: minor + patch bumps are bundled into ONE PR per entry, so a
#     week's routine updates land as a handful of grouped PRs instead of
#     dozens. Major bumps still come as individual PRs (they need careful
#     review anyway).
version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/Backend/discovery-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
