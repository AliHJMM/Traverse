jenkins:
  systemMessage: "Traverse CI"
  # Docker Desktop's VM here only has ~7.4GB total, shared across the whole
  # already-running stack (14 containers) plus whatever a build spawns.
  # The backend build stage runs its 6 services in a genuine sequential
  # loop (see Jenkinsfile) rather than a parallel/matrix stage specifically
  # because of this constraint -- Declarative parallel branches aren't
  # gated by executor count anyway (they're concurrent threads inside the
  # one already-allocated node). Pinning to 1 executor here is a second,
  # coarser safety net: it stops multiple separate BUILDS (e.g. two
  # branches triggered close together) from stacking memory pressure on
  # top of each other.
  numExecutors: 1
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-credentials"
              username: "AliHJMM"
              password: "${GITHUB_TOKEN}"
              description: "GitHub PAT -- repo checkout + commit status reporting"
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONARQUBE_TOKEN}"
              description: "SonarQube analysis token"

unclassified:
  location:
    url: "http://localhost:8090/"
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonarqube-token"

# Multibranch (not a single pipelineJob) so every branch AND every PR gets
# built automatically -- the github-branch-source plugin reports a real
# GitHub Checks status per head it builds, which is what branch protection's
# "require status checks to pass" gates on. Periodic scan (every 2 minutes)
# is the multibranch equivalent of classic Poll SCM -- no public webhook
# endpoint needed since Jenkins is doing the asking, not GitHub.
jobs:
  - script: >
      multibranchPipelineJob('traverse-pipeline') {
        branchSources {
          branchSource {
            source {
              github {
                id('traverse-github-source')
                configuredByUrl(true)
                repositoryUrl('https://github.com/AliHJMM/Traverse')
                repoOwner('AliHJMM')
                repository('Traverse')
                credentialsId('github-credentials')
                traits {
                  gitHubBranchDiscovery {
                    strategyId(1)
                  }
                  gitHubPullRequestDiscovery {
                    strategyId(1)
                  }
                }
              }
            }
          }
        }
        factory {
          workflowBranchProjectFactory {
            scriptPath('jenkins/Jenkinsfile')
          }
        }
        triggers {
          periodicFolderTrigger {
            interval('2m')
          }
        }
      }
