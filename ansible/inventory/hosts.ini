# Single-host project: everything (Postgres, Neo4j, all microservices,
# Jenkins, SonarQube) runs as containers on one Docker Desktop engine, so
# there is exactly one target and it is always the machine ansible-playbook
# itself runs on -- either a WSL shell on the Windows dev machine, or the
# Jenkins container during the deploy stage (both reach the same Docker
# engine, see docker-compose.yml's docker.sock mount for the Jenkins case).
#
# Kept as a real inventory group (not `hosts: localhost` hardcoded in the
# playbooks) so pointing this at an actual remote Docker host later is an
# inventory change, not a playbook rewrite.
[traverse_host]
localhost ansible_connection=local
