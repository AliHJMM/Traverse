---
# Idempotent self-signed TLS cert generation for the frontend's nginx (see
# certs/README.md for why self-signed rather than Let's Encrypt). Only
# regenerates when the cert is actually missing or expiring soon -- a
# fresh, valid cert on every deploy would force browsers to re-trust it and
# invalidate any previously-issued sessions for no reason.
- name: Check whether a TLS cert already exists
  stat:
    path: "{{ traverse_project_dir }}/certs/traverse.crt"
  register: tls_cert_stat

- name: Check whether the existing cert expires within 30 days
  command: openssl x509 -checkend 2592000 -noout -in "{{ traverse_project_dir }}/certs/traverse.crt"
  register: tls_cert_checkend
  changed_when: false
  failed_when: false
  when: tls_cert_stat.stat.exists

- name: Generate a self-signed TLS cert + key (only if missing or expiring soon)
  command: >-
    openssl req -x509 -nodes -newkey rsa:2048
    -keyout {{ traverse_project_dir }}/certs/traverse.key
    -out {{ traverse_project_dir }}/certs/traverse.crt
    -days 365
    -subj "/CN=localhost"
    -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
  when: >-
    not tls_cert_stat.stat.exists or
    tls_cert_checkend.rc != 0

- name: Report TLS cert status
  debug:
    msg: >-
      {{ 'Generated a new self-signed cert (missing or expiring within 30 days).'
         if (not tls_cert_stat.stat.exists or tls_cert_checkend.rc != 0)
         else 'Existing cert is still valid for 30+ days -- left untouched.' }}

# Staged into the Frontend build context so Frontend/Dockerfile can COPY
# it at build time instead of docker-compose runtime-bind-mounting it --
# see docker-compose.yml's frontend service and Frontend/Dockerfile for
# why a runtime bind mount breaks when Jenkins triggers the deploy
# (confirmed live: main build #20, "no such file" from nginx because the
# relative ./certs path resolved against Jenkins' own /host-project view,
# a path the real Docker daemon has no knowledge of). Always re-copied
# (regardless of whether a new cert was just generated above) so
# Frontend/certs/ never silently drifts from the real one in certs/.
- name: Stage the cert into the Frontend build context
  copy:
    src: "{{ traverse_project_dir }}/certs/{{ item }}"
    dest: "{{ traverse_project_dir }}/Frontend/certs/{{ item }}"
    mode: "0644"
    remote_src: true
  loop:
    - traverse.crt
    - traverse.key
