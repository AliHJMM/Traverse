server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Auto-discovers every container on this Docker engine (the same one
# running the whole traverse-net stack, reached via the mounted
# docker.sock -- same docker-outside-of-docker approach already used by
# Jenkins, see docker-compose.yml). Labels come from each container's own
# name/compose-service label rather than being hardcoded per service, so a
# new backend service or an extra replica is picked up automatically with
# no promtail config change.
scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      # Unwraps Docker's json-file log envelope ({"log":...,"stream":...})
      # to get at the actual application log line.
      - docker: {}
      # correlationId is deliberately NOT promoted to a Loki label here --
      # it's unique per request (unbounded cardinality), and Loki's index
      # is label-based, so indexing it would blow up the index size for no
      # real benefit. It stays fully searchable via LogQL line filters
      # (e.g. `|= "correlationId-value"`) in Grafana Explore instead.
