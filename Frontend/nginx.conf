# All plain-HTTP traffic redirects to HTTPS -- nothing is ever served
# unencrypted here. See Plan.md Phase 11 for why the certificate is a
# locally-generated self-signed one (ansible/roles/tls_certs) rather than a
# real Let's Encrypt cert: Let's Encrypt can only issue for a real,
# publicly-resolvable domain, which this local Docker Desktop deployment
# doesn't have. Swapping in a real cert later is a volume-mount change, not
# a config rewrite -- see certs/README.md.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/traverse.crt;
    ssl_certificate_key /etc/nginx/certs/traverse.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy is what makes the httpOnly, SameSite=Strict auth
    # cookie actually work: the browser only sends it because the API
    # appears to live on this same origin, not a different port/host.
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
