services:
  # No host port mapping (Plan.md Phase 11: "restrict database access to
  # the internal network... only") -- reachable only from other containers
  # on traverse-net, never from the host directly. Debugging now goes
  # through `docker exec -it traverse-postgres psql ...` instead of a host
  # client on localhost:5432.
  postgres:
    image: postgres:16-alpine
    container_name: traverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Same network-only restriction as postgres above -- no host port
  # mapping. `docker exec -it traverse-neo4j cypher-shell` replaces the
  # old host-side cypher-shell/browser access used in earlier phases.
  neo4j:
    image: neo4j:5-community
    container_name: traverse-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dev-mode Vault (in-memory storage, auto-unsealed with a fixed root
  # token) -- not production-hardened, but a real, working secret store:
  # source of truth for JWT_SECRET/DB passwords/Stripe+PayPal keys, read by
  # ansible/roles/vault_secrets at deploy time instead of a hand-edited
  # .env (Plan.md Phase 11). Published to the host deliberately, unlike
  # postgres/neo4j above -- Vault's security model is authentication
  # (every secret read needs a valid token), not network isolation, so
  # host access doesn't violate "internal network or authenticated
  # endpoints only."
  vault:
    image: hashicorp/vault:1.17
    container_name: traverse-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    build:
      context: ./Backend/discovery-server
    container_name: traverse-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./Backend/gateway
    container_name: traverse-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - traverse-net
    depends_on:
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping here on purpose -- this service is
  # meant to be run with multiple replicas, e.g.
  # `docker compose up -d --scale auth-service=3`, and the Gateway reaches
  # all of them (load-balanced) through Eureka, not a fixed host:port.
  auth-service:
    build:
      context: ./Backend/auth-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as
  # auth-service, reached only through the Gateway/Eureka.
  user-service:
    build:
      context: ./Backend/user-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as
  # auth-service and user-service.
  travel-service:
    build:
      context: ./Backend/travel-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as the
  # other backend services.
  payment-service:
    build:
      context: ./Backend/payment-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PAYPAL_BASE_URI: ${PAYPAL_BASE_URI}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # Cert is generated by ansible/roles/tls_certs and staged into
  # Frontend/certs/ before every build, then baked into the image at build
  # time (not runtime-bind-mounted -- see Frontend/Dockerfile for why a
  # relative bind-mount source breaks when Jenkins triggers the deploy,
  # confirmed live: main build #20). :80 exists only to 301-redirect to
  # :443, nginx never serves plaintext content.
  frontend:
    build:
      context: ./Frontend
    container_name: traverse-frontend
    restart: unless-stopped
    environment:
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    ports:
      - "80:80"
      - "443:443"
    networks:
      - traverse-net
    depends_on:
      - gateway

  sonarqube-db:
    image: postgres:16-alpine
    container_name: traverse-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONARQUBE_DB_USER} -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SonarQube's bundled Elasticsearch needs a raised vm.max_map_count. On
  # Docker Desktop/WSL2 this parameter isn't namespaced per-container -- a
  # compose-level `sysctls:` override actually fails container creation
  # outright ("not in a separate kernel namespace") rather than being
  # silently ignored. It has to be raised on the WSL2 VM itself instead; see
  # Plan.md Phase 8 for the one-time `wsl -d docker-desktop sysctl -w
  # vm.max_map_count=262144` host command.
  sonarqube:
    image: sonarqube:community
    container_name: traverse-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - traverse-net
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20

  # Docker CLI is available inside the container (mounted host socket) so the
  # pipeline can `docker build`/`docker compose up` the real stack without a
  # separate Docker-in-Docker daemon -- "docker-outside-of-docker".
  jenkins:
    build:
      context: ./jenkins
    container_name: traverse-jenkins
    restart: unless-stopped
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
    ports:
      - "8090:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      # Runs as root (see jenkins/Dockerfile), so this is root's Maven cache
      # -- without it, every container recreate re-downloads the entire
      # dependency tree for all 6 backend modules from scratch.
      - jenkins_maven_repo:/root/.m2
      # The real project directory (this same docker-compose.yml lives
      # here), so the pipeline's deploy stage can run `docker compose up`
      # against the actual .env instead of its own gitignore'd-.env-less
      # git checkout. See jenkins/Jenkinsfile's deploy stage.
      #
      # Read-write, not :ro -- this mount is used ONLY by the deploy stage
      # (build/test/SonarQube stages all operate on Jenkins' own separate
      # git checkout workspace, never touching /host-project), and the
      # deploy stage's Ansible roles have real, legitimate writes to make
      # here: tls_certs stages the cert into Frontend/certs/ before every
      # build, and vault_secrets syncs secrets into .env. A `:ro` mount
      # never actually blocked anything before this, purely by
      # coincidence -- every prior .env write happened to be a no-op
      # (values already matched from an earlier manual WSL-run deploy).
      # Confirmed live: main build #20 exposed this for real once a write
      # that mattered (staging the cert) actually had to happen --
      # "Destination /host-project/Frontend/certs not writable".
      - .:/host-project
    networks:
      - traverse-net
    depends_on:
      - sonarqube

  # Single-binary Loki (filesystem storage) -- centralized log storage/query
  # engine. See Plan.md Phase 10 for why Loki over ELK: much lighter than a
  # second Elasticsearch on a host that already runs one for SonarQube (see
  # Phase 8 bug #9), which mattered given the real memory/CPU pressure hit
  # during Phase 9.
  loki:
    image: grafana/loki:2.9.8
    container_name: traverse-loki
    restart: unless-stopped
    volumes:
      - ./logging/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auto-discovers every container on this Docker engine via the mounted
  # docker.sock (docker-outside-of-docker, same approach Jenkins already
  # uses) and ships their stdout logs to Loki -- no per-service config
  # needed, new services/replicas are picked up automatically.
  promtail:
    image: grafana/promtail:2.9.8
    container_name: traverse-promtail
    restart: unless-stopped
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - traverse-net
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    container_name: traverse-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./logging/grafana-provisioning-datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - traverse-net
    depends_on:
      loki:
        condition: service_healthy

networks:
  traverse-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_home:
  jenkins_maven_repo:
  loki_data:
  grafana_data:
