services:
  postgres:
    image: postgres:16-alpine
    container_name: traverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: traverse-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./Backend/gateway
    container_name: traverse-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      AUTH_SERVICE_URI: http://auth-service:8081
      USER_SERVICE_URI: http://user-service:8082
      TRAVEL_SERVICE_URI: http://travel-service:8083
      PAYMENT_SERVICE_URI: http://payment-service:8084
    ports:
      - "8080:8080"
    networks:
      - traverse-net
    depends_on:
      - auth-service

  auth-service:
    build:
      context: ./Backend/auth-service
    container_name: traverse-auth-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
    ports:
      - "8081:8081"
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy

  # user-service, travel-service, payment-service, and Frontend/ are added
  # once their Dockerfiles exist (Phases 4-7 of Plan.md).

networks:
  traverse-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
