services:
  postgres:
    image: postgres:16-alpine
    container_name: traverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: traverse-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    build:
      context: ./Backend/discovery-server
    container_name: traverse-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./Backend/gateway
    container_name: traverse-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - traverse-net
    depends_on:
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping here on purpose -- this service is
  # meant to be run with multiple replicas, e.g.
  # `docker compose up -d --scale auth-service=3`, and the Gateway reaches
  # all of them (load-balanced) through Eureka, not a fixed host:port.
  auth-service:
    build:
      context: ./Backend/auth-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as
  # auth-service, reached only through the Gateway/Eureka.
  user-service:
    build:
      context: ./Backend/user-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as
  # auth-service and user-service.
  travel-service:
    build:
      context: ./Backend/travel-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as the
  # other backend services.
  payment-service:
    build:
      context: ./Backend/payment-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PAYPAL_BASE_URI: ${PAYPAL_BASE_URI}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
    container_name: traverse-frontend
    restart: unless-stopped
    environment:
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    ports:
      - "80:80"
    networks:
      - traverse-net
    depends_on:
      - gateway

  sonarqube-db:
    image: postgres:16-alpine
    container_name: traverse-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONARQUBE_DB_USER} -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SonarQube's bundled Elasticsearch needs a raised vm.max_map_count. On
  # Docker Desktop/WSL2 this parameter isn't namespaced per-container -- a
  # compose-level `sysctls:` override actually fails container creation
  # outright ("not in a separate kernel namespace") rather than being
  # silently ignored. It has to be raised on the WSL2 VM itself instead; see
  # Plan.md Phase 8 for the one-time `wsl -d docker-desktop sysctl -w
  # vm.max_map_count=262144` host command.
  sonarqube:
    image: sonarqube:community
    container_name: traverse-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONARQUBE_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - traverse-net
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20

  # Docker CLI is available inside the container (mounted host socket) so the
  # pipeline can `docker build`/`docker compose up` the real stack without a
  # separate Docker-in-Docker daemon -- "docker-outside-of-docker".
  jenkins:
    build:
      context: ./jenkins
    container_name: traverse-jenkins
    restart: unless-stopped
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
    ports:
      - "8090:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
    networks:
      - traverse-net
    depends_on:
      - sonarqube

networks:
  traverse-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_home:
