services:
  postgres:
    image: postgres:16-alpine
    container_name: traverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: traverse-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    build:
      context: ./Backend/discovery-server
    container_name: traverse-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - traverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./Backend/gateway
    container_name: traverse-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - traverse-net
    depends_on:
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping here on purpose -- this service is
  # meant to be run with multiple replicas, e.g.
  # `docker compose up -d --scale auth-service=3`, and the Gateway reaches
  # all of them (load-balanced) through Eureka, not a fixed host:port.
  auth-service:
    build:
      context: ./Backend/auth-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as
  # auth-service, reached only through the Gateway/Eureka.
  user-service:
    build:
      context: ./Backend/user-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as
  # auth-service and user-service.
  travel-service:
    build:
      context: ./Backend/travel-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # No container_name / host port mapping -- scalable the same way as the
  # other backend services.
  payment-service:
    build:
      context: ./Backend/payment-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      EUREKA_URI: http://discovery-server:8761/eureka
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PAYPAL_BASE_URI: ${PAYPAL_BASE_URI}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
    networks:
      - traverse-net
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # Frontend/ is added once its Dockerfile exists (Phase 7 of Plan.md).

networks:
  traverse-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
